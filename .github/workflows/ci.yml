name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gameboxd_test
          POSTGRES_USER: gameboxd
          POSTGRES_PASSWORD: gameboxd
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "True"
          DATABASE_URL: postgres://gameboxd:gameboxd@localhost:5432/gameboxd_test
          IGDB_CLIENT_ID: fake
          IGDB_CLIENT_SECRET: fake
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: pytest --cov=apps --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
